# PowerSync service configuration for Chronolog (self-hosted, single-user)

telemetry:
  disable_telemetry_sharing: true

replication:
  connections:
    - type: postgresql
      uri: !env PS_DATA_SOURCE_URI
      sslmode: disable

storage:
  type: postgresql
  uri: !env PS_STORAGE_SOURCE_URI
  sslmode: disable

port: !env PS_PORT::number

sync_rules:
  path: sync_rules.yaml

client_auth:
  jwks_uri: http://app:5173/api/powersync/jwks
  audience: ["powersync"]
